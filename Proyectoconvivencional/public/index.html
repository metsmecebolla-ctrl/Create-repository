<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Convivencia GDC - IED Ceis</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --main-blue: #1a2a6c; --light-blue: #eef2f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light-blue); margin: 0; padding: 20px; }
        
        /* Contenedor tipo Portada */
        .portal { background: white; max-width: 800px; margin: auto; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        
        .roles-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .role-card { border: 1px solid #ddd; padding: 20px; border-radius: 15px; width: 45%; text-align: center; transition: 0.3s; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: var(--main-blue); width: 100%; }
        .back { background: #95a5a6; margin-top: 10px; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <h1>Colegio IED Ceis</h1>
        <h2>Gestión de Convivencia (GDC)</h2>
    </div>

    <div id="menu-inicial">
        <p style="text-align:center;">Seleccione su rol para continuar</p>
        <div class="roles-container">
            <div class="role-card">
                <h3>Perfil Institucional</h3>
                <button class="btn" onclick="mostrarLogin()">Ingresar</button>
            </div>
            <div class="role-card">
                <h3>Acudiente</h3>
                <button class="btn" style="background:#27ae60;" onclick="iniciarQr()">Ingresar</button>
            </div>
        </div>
    </div>

    <div id="login-form" class="hidden" style="text-align:center;">
        <h3>Acceso Institucional</h3>
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn" onclick="validar()">Verificar</button>
        <button class="btn back" onclick="volver()">Volver</button>
    </div>

    <div id="qr-section" class="hidden">
        <div id="reader"></div>
        <button class="btn back" onclick="volver()">Volver al Inicio</button>
    </div>
</div>

<script>
function mostrarLogin() {
    document.getElementById('menu-inicial').classList.add('hidden');
    document.getElementById('login-form').classList.remove('hidden');
}

function validar() {
    if (document.getElementById('pass').value === 'COMPLEJOCEIS67') {
        document.getElementById('login-form').classList.add('hidden');
        iniciarQr();
    } else { alert('Clave incorrecta'); }
}

function iniciarQr() {
    document.getElementById('menu-inicial').classList.add('hidden');
    document.getElementById('login-form').classList.add('hidden');
    document.getElementById('qr-section').classList.remove('hidden');
    new Html5QrcodeScanner("reader", {fps: 10, qrbox: 250}).render((id) => {
        alert("Escaneado: " + id);
    });
}

function volver() { location.reload(); }
</script>
</body>
</html>
